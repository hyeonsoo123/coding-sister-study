<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✅ 주문 완료 · Coding Sister</title>
    <meta name="description" content="대여 결제가 완료되었습니다.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✅</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen font-sans">
    <header class="bg-white shadow-md">
        <div class="max-w-3xl mx-auto px-4 sm:px-6 py-4">
            <a href="index.html" class="text-xl font-bold text-indigo-600">🎬 Coding Sister 영화</a>
        </div>
    </header>

    <main class="max-w-3xl mx-auto px-4 sm:px-6 py-10">
        <div id="orderRoot" class="text-center py-20 text-gray-400 animate-pulse">주문 정보를 불러오는 중...</div>
    </main>

    <script>
        (async () => {
            const API_BASE = location.port === '8081' ? 'http://localhost:3001/api' : '/api';
            const root = document.getElementById('orderRoot');
            const orderId = new URLSearchParams(location.search).get('orderId');

            const esc = (s) => String(s ?? '').replace(/[&<>"']/g, (c) =>
                ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));

            function renderError(msg) {
                root.innerHTML = `
                    <div class="text-6xl mb-4">😵</div>
                    <p class="text-lg font-bold text-gray-700">${esc(msg)}</p>
                    <a href="index.html" class="inline-block mt-5 px-5 py-3 bg-indigo-600 text-white rounded-lg font-semibold">← 홈으로</a>`;
            }

            if (!orderId) return renderError('주문번호가 없습니다.');

            try {
                const res = await fetch(`${API_BASE}/purchases?orderId=${encodeURIComponent(orderId)}`);
                if (!res.ok) throw new Error((await res.json()).error || '조회 실패');
                const { item } = await res.json();

                const poster = item.posterPath
                    ? `https://image.tmdb.org/t/p/w342${item.posterPath}`
                    : 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg"/>';
                const when = new Date(item.createdAt).toLocaleString('ko-KR');

                root.className = '';
                root.innerHTML = `
                    <div class="text-center mb-8">
                        <div class="text-6xl mb-3">🎉</div>
                        <h1 class="text-2xl sm:text-3xl font-bold text-gray-900">결제가 완료되었습니다!</h1>
                        <p class="text-gray-500 mt-2">7일 동안 시청할 수 있어요.</p>
                    </div>

                    <div class="bg-white rounded-2xl shadow-lg overflow-hidden">
                        <div class="flex gap-5 p-6">
                            <img src="${poster}" alt="" class="w-24 sm:w-32 rounded-xl shadow shrink-0 bg-gray-200">
                            <div class="min-w-0 text-left">
                                <p class="font-bold text-lg sm:text-xl text-gray-900 leading-snug">${esc(item.title)}</p>
                                <dl class="mt-3 space-y-1.5 text-sm">
                                    <div class="flex gap-2"><dt class="text-gray-400 w-16 shrink-0">주문번호</dt><dd class="text-gray-700 font-mono break-all">${esc(item._id)}</dd></div>
                                    <div class="flex gap-2"><dt class="text-gray-400 w-16 shrink-0">결제일시</dt><dd class="text-gray-700">${when}</dd></div>
                                    <div class="flex gap-2"><dt class="text-gray-400 w-16 shrink-0">결제금액</dt><dd class="text-indigo-600 font-bold">₩${(item.price || 0).toLocaleString()}</dd></div>
                                    <div class="flex gap-2"><dt class="text-gray-400 w-16 shrink-0">결제수단</dt><dd class="text-gray-700">데모 결제 (실제 과금 없음)</dd></div>
                                </dl>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-px bg-gray-100">
                            <a href="movie-detail.html?id=${Number(item.movieId)}"
                               class="bg-indigo-600 hover:bg-indigo-700 text-white text-center py-4 font-bold transition">▶️ 바로 시청하기</a>
                            <a href="my-page.html"
                               class="bg-white hover:bg-gray-50 text-gray-700 text-center py-4 font-bold transition">🙋 마이페이지</a>
                        </div>
                    </div>

                    <p class="text-center mt-6">
                        <a href="index.html" class="text-sm text-gray-400 hover:text-gray-600">← 계속 둘러보기</a>
                    </p>`;
            } catch (e) {
                renderError(e.message);
            }
        })();
    </script>
</body>
</html>
