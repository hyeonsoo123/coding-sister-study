<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔐 관리자 로그인 · Coding Sister</title>
    <meta name="description" content="상품 관리 어드민 로그인 페이지">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔐</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-indigo-50 to-indigo-100 min-h-screen font-sans flex items-center justify-center px-4">
    <main class="w-full max-w-sm">
        <div class="text-center mb-6">
            <a href="index.html" class="text-2xl font-bold text-indigo-600">🎬 Coding Sister</a>
            <p class="text-gray-500 mt-1 text-sm">상품 관리 어드민</p>
        </div>

        <form id="loginForm" class="bg-white rounded-2xl shadow-lg p-6 sm:p-8 space-y-4">
            <h1 class="text-xl font-bold text-gray-800 flex items-center gap-2">🔐 관리자 로그인</h1>

            <label class="block">
                <span class="block text-sm font-semibold text-gray-600 mb-1">아이디</span>
                <input name="id" type="text" autocomplete="username" placeholder="admin"
                       class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-300 outline-none min-h-[48px]">
            </label>

            <label class="block">
                <span class="block text-sm font-semibold text-gray-600 mb-1">비밀번호</span>
                <input name="pw" type="password" autocomplete="current-password" placeholder="••••••••"
                       class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-300 outline-none min-h-[48px]">
            </label>

            <p id="errorMsg" class="hidden text-sm text-red-500 font-medium">아이디 또는 비밀번호가 올바르지 않습니다.</p>

            <button type="submit"
                    class="w-full py-3 bg-indigo-600 text-white rounded-lg font-bold hover:bg-indigo-700 transition min-h-[48px]">
                로그인
            </button>

            <p class="text-xs text-gray-400 text-center pt-1">데모 계정: <b>admin</b> / <b>admin1234</b></p>
        </form>

        <div class="text-center mt-4">
            <a href="index.html" class="text-sm text-indigo-500 hover:underline">← 사이트로 돌아가기</a>
        </div>
    </main>

    <script src="js/admin/auth.js"></script>
    <script>
        AdminAuth.redirectIfLoggedIn();

        const form = document.getElementById('loginForm');
        const errorMsg = document.getElementById('errorMsg');

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const id = form.elements.id.value.trim();
            const pw = form.elements.pw.value;
            if (AdminAuth.login(id, pw)) {
                location.replace(AdminAuth.ADMIN_PAGE);
            } else {
                errorMsg.classList.remove('hidden');
                form.pw.value = '';
                form.pw.focus();
            }
        });

        form.addEventListener('input', () => errorMsg.classList.add('hidden'));
    </script>
</body>
</html>
