<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📦 상품 관리 · Coding Sister</title>
    <meta name="description" content="관리자 상품 목록 · 추가/수정/삭제">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📦</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 미로그인 시 화면 깜빡임 방지: 가드 통과 전 body 숨김 -->
    <script src="js/admin/auth.js"></script>
    <script>if (!AdminAuth.isLoggedIn()) location.replace('admin-login.html');</script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen font-sans">
    <!-- 헤더 -->
    <header class="bg-white shadow-md sticky top-0 z-40">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between gap-3">
            <a href="index.html" class="text-lg sm:text-xl font-bold text-indigo-600 shrink-0">🎬<span class="hidden sm:inline"> Coding Sister</span></a>
            <div class="flex items-center gap-2 sm:gap-3">
                <span class="text-sm text-gray-500 hidden sm:inline">👤 <b id="adminName" class="text-gray-700">admin</b></span>
                <button id="logoutBtn" class="px-3 py-2 bg-gray-100 text-gray-600 rounded-lg hover:bg-gray-200 transition text-sm font-semibold min-h-[44px]">로그아웃</button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 sm:px-6 py-6">
        <!-- 타이틀 + 액션 -->
        <div class="flex flex-wrap items-center justify-between gap-3 mb-5">
            <div>
                <h1 class="text-2xl font-bold text-gray-800">📦 상품 관리</h1>
                <p class="text-sm text-gray-500 mt-0.5"><span id="countLabel">총 0개</span></p>
            </div>
            <div class="flex items-center gap-2 w-full sm:w-auto">
                <div class="relative flex-1 sm:flex-none">
                    <input id="searchInput" type="search" placeholder="상품명·카테고리 검색…"
                           class="w-full sm:w-64 pl-4 pr-4 py-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-300 outline-none min-h-[44px]">
                </div>
                <button id="addBtn" class="px-4 py-2.5 bg-indigo-600 text-white rounded-lg font-bold hover:bg-indigo-700 transition min-h-[44px] whitespace-nowrap">+ 상품 추가</button>
            </div>
        </div>

        <!-- 목록 -->
        <div class="bg-white rounded-xl shadow overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead>
                        <tr class="bg-gray-50 text-gray-500 text-left">
                            <th class="py-3 px-4 font-semibold">상품</th>
                            <th class="py-3 px-4 font-semibold hidden sm:table-cell">카테고리</th>
                            <th class="py-3 px-4 font-semibold hidden sm:table-cell text-right">가격</th>
                            <th class="py-3 px-4 font-semibold text-center">재고</th>
                            <th class="py-3 px-4 font-semibold text-right">관리</th>
                        </tr>
                    </thead>
                    <tbody id="productRows"></tbody>
                </table>
            </div>

            <!-- 빈 상태 -->
            <div id="emptyState" class="hidden text-center py-16 px-4">
                <div class="text-5xl mb-3">📦</div>
                <p class="text-gray-500">등록된 상품이 없습니다.</p>
                <button id="emptyAddBtn" class="mt-4 px-5 py-2.5 bg-indigo-600 text-white rounded-lg font-bold hover:bg-indigo-700 transition min-h-[44px]">+ 첫 상품 추가</button>
            </div>
        </div>
    </main>

    <!-- 상품 추가/수정 모달 -->
    <div id="productModal" class="hidden fixed inset-0 z-50 bg-black/50 items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-md">
            <form id="productForm" class="p-6 space-y-4">
                <h2 id="modalTitle" class="text-xl font-bold text-gray-800">상품 추가</h2>

                <label class="block">
                    <span class="block text-sm font-semibold text-gray-600 mb-1">상품명 <span class="text-red-400">*</span></span>
                    <input name="name" type="text" required maxlength="80"
                           class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-300 outline-none min-h-[44px]">
                </label>

                <div class="grid grid-cols-2 gap-3">
                    <label class="block">
                        <span class="block text-sm font-semibold text-gray-600 mb-1">가격(원)</span>
                        <input name="price" type="number" min="0" step="100" inputmode="numeric" placeholder="0"
                               class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-300 outline-none min-h-[44px]">
                    </label>
                    <label class="block">
                        <span class="block text-sm font-semibold text-gray-600 mb-1">재고(개)</span>
                        <input name="stock" type="number" min="0" step="1" inputmode="numeric" placeholder="0"
                               class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-300 outline-none min-h-[44px]">
                    </label>
                </div>

                <label class="block">
                    <span class="block text-sm font-semibold text-gray-600 mb-1">카테고리</span>
                    <input name="category" type="text" maxlength="40" placeholder="예: 전자기기"
                           class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-300 outline-none min-h-[44px]">
                </label>

                <label class="block">
                    <span class="block text-sm font-semibold text-gray-600 mb-1">이미지 URL</span>
                    <input name="image" type="url" placeholder="https://…"
                           class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-300 outline-none min-h-[44px]">
                </label>

                <div class="flex justify-end gap-2 pt-2">
                    <button id="cancelBtn" type="button" class="px-4 py-2.5 bg-gray-100 text-gray-600 rounded-lg font-semibold hover:bg-gray-200 transition min-h-[44px]">취소</button>
                    <button type="submit" class="px-5 py-2.5 bg-indigo-600 text-white rounded-lg font-bold hover:bg-indigo-700 transition min-h-[44px]">저장</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/admin/products.js"></script>
</body>
</html>
