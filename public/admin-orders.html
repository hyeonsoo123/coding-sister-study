<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧾 주문 관리 · Coding Sister</title>
    <meta name="description" content="관리자 주문 목록 · 매출 현황">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧾</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 미로그인 시 화면 깜빡임 방지: 가드 통과 전 즉시 이동 -->
    <script src="js/admin/auth.js"></script>
    <script>if (!AdminAuth.isLoggedIn()) location.replace('admin-login.html');</script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen font-sans">
    <!-- 헤더 -->
    <header class="bg-white shadow-md sticky top-0 z-40">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between gap-3">
            <a href="index.html" class="text-lg sm:text-xl font-bold text-indigo-600 shrink-0">🎬<span class="hidden sm:inline"> Coding Sister</span></a>
            <div class="flex items-center gap-2 sm:gap-3">
                <a href="admin-products.html" class="px-3 py-2 bg-indigo-50 text-indigo-600 rounded-lg hover:bg-indigo-100 transition text-sm font-semibold min-h-[44px] inline-flex items-center">📦 상품 관리</a>
                <span class="text-sm text-gray-500 hidden sm:inline">👤 <b id="adminName" class="text-gray-700">admin</b></span>
                <button id="logoutBtn" class="px-3 py-2 bg-gray-100 text-gray-600 rounded-lg hover:bg-gray-200 transition text-sm font-semibold min-h-[44px]">로그아웃</button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 sm:px-6 py-6">
        <div class="flex flex-wrap items-center justify-between gap-3 mb-5">
            <div>
                <h1 class="text-2xl font-bold text-gray-800">🧾 주문 관리</h1>
                <p class="text-sm text-gray-500 mt-0.5">영화 대여 결제 내역 (MongoDB Atlas 실시간 조회)</p>
            </div>
            <button id="refreshBtn" class="px-4 py-2.5 bg-indigo-600 text-white rounded-lg font-bold hover:bg-indigo-700 transition min-h-[44px]">↻ 새로고침</button>
        </div>

        <!-- 요약 카드 -->
        <div class="grid grid-cols-2 gap-3 sm:gap-4 mb-6">
            <div class="bg-white rounded-xl shadow p-4 sm:p-5">
                <p class="text-sm text-gray-400">총 주문</p>
                <p id="statCount" class="text-2xl sm:text-3xl font-bold text-gray-800 mt-1">–</p>
            </div>
            <div class="bg-white rounded-xl shadow p-4 sm:p-5">
                <p class="text-sm text-gray-400">총 매출</p>
                <p id="statRevenue" class="text-2xl sm:text-3xl font-bold text-indigo-600 mt-1">–</p>
            </div>
        </div>

        <!-- 주문 목록 -->
        <div class="bg-white rounded-xl shadow overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead>
                        <tr class="bg-gray-50 text-gray-500 text-left">
                            <th class="py-3 px-4 font-semibold">영화</th>
                            <th class="py-3 px-4 font-semibold hidden sm:table-cell">주문번호</th>
                            <th class="py-3 px-4 font-semibold">사용자</th>
                            <th class="py-3 px-4 font-semibold text-right">금액</th>
                            <th class="py-3 px-4 font-semibold hidden md:table-cell text-right">주문일시</th>
                        </tr>
                    </thead>
                    <tbody id="orderRows"></tbody>
                </table>
            </div>
            <div id="loadingState" class="text-center py-16 text-gray-400 animate-pulse">주문 내역을 불러오는 중...</div>
            <div id="emptyState" class="hidden text-center py-16 px-4">
                <div class="text-5xl mb-3">🧾</div>
                <p class="text-gray-500">아직 주문이 없습니다.</p>
            </div>
            <div id="errorState" class="hidden text-center py-16 px-4">
                <div class="text-5xl mb-3">😵</div>
                <p class="text-gray-500">주문 내역을 불러오지 못했습니다.<br>API 서버가 켜져 있는지 확인해주세요.</p>
            </div>
        </div>
    </main>

    <script src="js/admin/orders.js"></script>
</body>
</html>
